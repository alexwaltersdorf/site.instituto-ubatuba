# esbuild NAO pode entrar em onlyBuiltDependencies/allowBuilds com valor true:
# o postinstall dele (node install.js) falha com EACCES no build da
# Hostinger e derruba o pnpm install. O chmod +x dos binarios do esbuild
# e feito por scripts/fix-esbuild.cjs no inicio de todo build, e o
# .pnpmfile.cjs remove os scripts do esbuild onde pnpmfile e suportado.
#
# allowBuilds com valor false = pnpm sabe que nao deve rodar os scripts
# e nao emite ERR_PNPM_IGNORED_BUILDS.
onlyBuiltDependencies:
  - "@tailwindcss/oxide"
allowBuilds:
  esbuild: false
  "@esbuild/linux-x64": false
  "@esbuild/darwin-arm64": false
  "@esbuild/darwin-x64": false
  "@esbuild/win32-x64": false
overrides:
  "tailwindcss>nanoid": "3.3.7"
